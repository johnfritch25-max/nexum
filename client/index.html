<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Nexum — Real-time Messenger &amp; Community</title>
    <meta name="description" content="Nexum is a full-featured real-time communication platform with messaging, voice &amp; video calls, group chats, and a community hub. Built by Johnfritch R. Garcia." />
    <meta name="author" content="Johnfritch R. Garcia" />
    <meta name="keywords" content="nexum, messenger, real-time chat, video call, voice call, community, group chat" />

    <!-- Theme color (browser toolbar on mobile) -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="color-scheme" content="dark" />

    <!-- Favicon — SVG works in all modern browsers -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback for older browsers -->
    <link rel="alternate icon" href="/favicon.svg" />
    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (for link previews on social media / Discord / Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nexum — Real-time Messenger &amp; Community" />
    <meta property="og:description" content="Full-featured real-time communication platform with messaging, voice &amp; video calls, group chats, and a community hub." />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Nexum" />
    <meta name="twitter:description" content="Real-time messenger and community platform." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
