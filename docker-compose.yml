version: '3.9'

services:

  # ── MySQL database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: messenger_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE:      messenger_db
      MYSQL_USER:          messenger_user
      MYSQL_PASSWORD:      messenger_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "messenger_user", "-pmessenger_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js server ──────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: messenger_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:                4000
      CLIENT_ORIGIN:       http://localhost:5173
      DB_HOST:             db
      DB_PORT:             3306
      DB_NAME:             messenger_db
      DB_USER:             messenger_user
      DB_PASSWORD:         messenger_pass
      JWT_SECRET:          change_this_to_a_long_random_secret
      JWT_REFRESH_SECRET:  change_this_refresh_secret_too
      JWT_EXPIRES_IN:      15m
      JWT_REFRESH_EXPIRES: 30d
    ports:
      - "4000:4000"

volumes:
  db_data:
